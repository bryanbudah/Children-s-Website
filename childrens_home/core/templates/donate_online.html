{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Donate Online</title>
  <script src="https://js.stripe.com/v3/"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded shadow">
  <h2 class="text-2xl font-bold mb-4 text-center">Donate with Card</h2>

  <input type="number" id="amount" placeholder="Enter amount" class="w-full p-3 mb-4 border rounded">

  <button id="checkout-button" class="w-full bg-blue-600 text-white p-3 rounded">
    Pay with Card
  </button>
</div>

<script>
document.getElementById("checkout-button").addEventListener("click", async () => {
    const amount = document.getElementById("amount").value;

    const response = await fetch("/create-checkout-session/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ amount: amount })
    });

    const session = await response.json();

    const stripe = Stripe("YOUR_PUBLIC_KEY");

    stripe.redirectToCheckout({
        sessionId: session.id
    });
});
</script>

</body>
</html>
