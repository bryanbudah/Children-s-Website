<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donate - Children's Home</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .status { margin-top: 20px; font-weight: bold; }
    .success { color: green; }
    .error { color: red; }
    .loading { color: orange; }
  </style>
</head>
<body>

  <h1>Donate to Children's Home</h1>

  <form id="donationForm">
    <label>Phone (2547xxxxxxx):</label><br>
    <input type="text" id="phone" required><br><br>

    <label>Amount (KES):</label><br>
    <input type="number" id="amount" required><br><br>

    <button type="submit">Donate</button>
  </form>

  <div id="status" class="status"></div>

  <script>
  const form = document.getElementById("donationForm");
  const statusDiv = document.getElementById("status");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const phone = document.getElementById("phone").value.trim();
    const amount = document.getElementById("amount").value.trim();

    // Basic validation
    if (!phone || !amount) {
      statusDiv.className = "status error";
      statusDiv.innerText = "❌ Please enter phone and amount.";
      return;
    }

    // Show loading
    statusDiv.className = "status loading";
    statusDiv.innerText = "⏳ Sending STK push... Check your phone";

    try {
      const res = await fetch("/donate/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ phone, amount })
      });

      const data = await res.json();
      console.log("Full response:", data);

      // ✅ FIXED: Check correct structure
      if (data.ResponseCode === "0") {
        statusDiv.className = "status success";
        statusDiv.innerText = "✅ STK Push sent! Enter your PIN on your phone.";
      } else {
        statusDiv.className = "status error";
        statusDiv.innerText =
          "❌ " + (data.ResponseDescription || "Failed to send STK push.");
      }

    } catch (error) {
      console.error(error);
      statusDiv.className = "status error";
      statusDiv.innerText = "⚠️ Network error. Please try again.";
    }
  });
</script>

</body>
</html>
