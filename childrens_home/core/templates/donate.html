{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>M-Pesa Donation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-green-100 to-green-300 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">

  <div class="text-center mb-6">
    <h1 class="text-3xl font-bold text-green-700">M-Pesa Donation 💚</h1>
    <p class="text-gray-500 text-sm">Fast & secure mobile payment</p>
  </div>

  <div class="space-y-4">
    <input id="phone" placeholder="2547XXXXXXXX"
      class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-400">

    <input id="amount" type="number" placeholder="Amount (KES)"
      class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-400">

    <button onclick="simulatePayment('mpesa')"
      class="w-full bg-green-600 hover:bg-green-700 text-white p-3 rounded-lg shadow-lg">
      📱 Pay with M-Pesa
    </button>
  </div>

  <div id="status" class="mt-6 text-center font-semibold"></div>

</div>

<!-- POPUP -->
<div id="popup" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
  <div class="bg-white p-6 rounded-2xl text-center w-80 animate-bounce shadow-2xl">
    <div class="text-green-500 text-5xl mb-2">✔</div>
    <h2 class="text-xl font-bold">Payment Confirmed</h2>
    <p class="text-gray-500 text-sm mt-2">We have received your donation</p>
    <p id="ref1" class="text-xs mt-2 text-gray-600"></p>

    <button onclick="closePopup()"
      class="mt-4 bg-green-600 text-white px-4 py-2 rounded-lg w-full">
      Done
    </button>
  </div>
</div>

<script>
async function simulatePayment(method) {
  const phone = document.getElementById("phone").value;
  const amount = document.getElementById("amount").value;
  const statusDiv = document.getElementById("status");

  if (!phone || !amount) {
    statusDiv.innerText = "❌ Enter phone and amount";
    statusDiv.className = "text-red-600";
    return;
  }

  statusDiv.innerText = "⏳ Processing...";
  statusDiv.className = "text-yellow-600 animate-pulse";

  await new Promise(r => setTimeout(r, 1200));

  const res = await fetch("/simulate-payment/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": getCookie('csrftoken')
    },
    body: JSON.stringify({ phone, amount, method })
  });

  const data = await res.json();

  showPopup(data.transaction_id);
}

function showPopup(ref) {
  document.getElementById("ref1").innerText = "Ref: " + ref;
  document.getElementById("popup").classList.remove("hidden");
}

function closePopup() {
  document.getElementById("popup").classList.add("hidden");
}

function getCookie(name) {
  let cookieValue = null;
  document.cookie.split(';').forEach(c => {
    c = c.trim();
    if (c.startsWith(name + '=')) {
      cookieValue = decodeURIComponent(c.substring(name.length + 1));
    }
  });
  return cookieValue;
}
</script>

</body>
</html>
