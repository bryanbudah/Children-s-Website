    <div class="overflow-hidden rounded-xl relative group">

    <div class="overflow-hidden rounded-xl relative group">
      <img src="images/bryan-waff-QxDDa5rRC9k-unsplash.jpg" class="gallery-item">

    <div class="overflow-hidden rounded-xl relative group">

    <div class="overflow-hidden rounded-xl relative group">
      <img src="images/gabriele-stravinskaite-HqqPqu3uIys-unsplash.jpg" class="gallery-item">
      <div class="overlay">Fun Moments</div>
    </div>

    <div class="overflow-hidden rounded-xl relative group">
      <img src="images/sneha-cecil-SM1YFmwsEqY-unsplash.jpg" class="gallery-item">
      <div class="overlay">Education</div>
    </div>

    <div class="overflow-hidden rounded-xl relative group">
      <img src="images/blake-cheek-un5MtX00fKM-unsplash.jpg" class="gallery-item">
      <div class="overlay">Growth</div>
    </div>

    <div class="overflow-hidden rounded-xl relative group">
      <img src="images/roman-nguyen-lPPkJ4NfQtQ-unsplash.jpg" class="gallery-item">

    </div>

  </div>
</section>

<!-- Lightbox -->
<div id="lightbox" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center">
  <button onclick="prevImage()" class="text-white text-3xl absolute left-10">⬅</button>
  <img id="lightbox-img" class="max-h-[80%] rounded-lg">
  <button onclick="nextImage()" class="text-white text-3xl absolute right-10">➡</button>
  <button onclick="closeLightbox()" class="absolute top-5 right-5 text-white text-2xl">✖</button>
</div>

<style>
.gallery-item {
  width: 100%;
  height: 250px;
  object-fit: cover;
  cursor: pointer;
  border-radius: 12px;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.gallery-item:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
}

/* Overlay Caption */
.overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 10px;
  background: rgba(0, 0, 0, 0.6);
  color: white;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.group:hover .overlay {
  opacity: 1;
}
</style>

<script>
let images = document.querySelectorAll(".gallery-item");
let current = 0;

images.forEach((img, index) => {
  img.addEventListener("click", () => {
    current = index;
    openLightbox();
  });
});

function openLightbox() {
  document.getElementById("lightbox").classList.remove("hidden");
  document.getElementById("lightbox-img").src = images[current].src;
}

function closeLightbox() {
  document.getElementById("lightbox").classList.add("hidden");
}

function nextImage() {
  current = (current + 1) % images.length;
  openLightbox();
}

function prevImage() {
  current = (current - 1 + images.length) % images.length;
  openLightbox();
}
</script>

</body>
</html>
