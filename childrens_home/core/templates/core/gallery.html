<!-- Lightbox -->
<div id="lightbox" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center">
  <button onclick="prevImage()" class="text-white text-3xl absolute left-10">⬅</button>
  <img id="lightbox-img" class="max-h-[80%] rounded-lg">
  <button onclick="nextImage()" class="text-white text-3xl absolute right-10">➡</button>
  <button onclick="closeLightbox()" class="absolute top-5 right-5 text-white text-2xl">✖</button>
</div>

<style>
.gallery-item {
  width: 100%;
  height: 250px;
  object-fit: cover;
  cursor: pointer;
  border-radius: 12px;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.gallery-item:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 10px;
  background: rgba(0, 0, 0, 0.6);
  color: white;
  opacity: 0;
}

.group:hover .overlay {
  opacity: 1;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const images = document.querySelectorAll(".gallery-item");
  let current = 0;

  images.forEach((img, index) => {
    img.addEventListener("click", () => {
      current = index;
      openLightbox();
    });
  });

  window.openLightbox = function () {
    document.getElementById("lightbox").classList.remove("hidden");
    document.getElementById("lightbox-img").src = images[current].src;
  };

  window.closeLightbox = function () {
    document.getElementById("lightbox").classList.add("hidden");
  };

  window.nextImage = function () {
    current = (current + 1) % images.length;
    openLightbox();
  };

  window.prevImage = function () {
    current = (current - 1 + images.length) % images.length;
    openLightbox();
  };
});
</script>

</body>
