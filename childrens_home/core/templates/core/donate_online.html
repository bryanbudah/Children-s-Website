{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Card Donation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-blue-300 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">

  <!-- Demo Banner -->
  <div class="bg-yellow-100 text-yellow-800 text-sm p-2 rounded mb-4 text-center">
    ⚠️ Demo Mode: Card payments are simulated.
  </div>

  <!-- Header -->
  <div class="text-center mb-6">
    <h2 class="text-3xl font-bold text-blue-700">Card Payment 💳</h2>
    <p class="text-gray-500 text-sm">Visa & Mastercard supported</p>
  </div>

  <!-- Amount -->
  <input id="amount" type="number" placeholder="Enter Amount (KES)"
    class="w-full p-3 border rounded-lg mb-4 focus:ring-2 focus:ring-blue-400">

  <!-- Fake Card UI -->
  <div class="bg-gray-100 p-4 rounded-lg mb-4">
    <p class="text-sm text-gray-500">Card Number</p>
    <div class="border p-2 rounded mb-2">**** **** **** 4242</div>

    <div class="flex gap-2">
      <div class="w-1/2 border p-2 rounded">MM/YY</div>
      <div class="w-1/2 border p-2 rounded">CVC</div>
    </div>
  </div>

  <!-- Logos -->
  <div class="flex justify-center gap-4 mb-4">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Visa_Logo.png" class="h-6">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png" class="h-6">
  </div>

  <!-- Button -->
  <button onclick="simulatePayment('card')"
    class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg shadow-lg transition">
    💳 Pay Securely
  </button>

  <!-- Status -->
  <div id="status" class="mt-6 text-center font-semibold"></div>

</div>

<!-- SUCCESS POPUP -->
<div id="successModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl p-6 w-80 text-center animate-bounce">

    <div class="text-green-500 text-5xl mb-3">✔</div>

    <h2 class="text-xl font-bold text-gray-800">Payment Confirmed</h2>
    <p class="text-gray-500 mt-2 text-sm">We have received your donation successfully.</p>

    <div id="refBox" class="mt-3 text-xs text-gray-600"></div>

    <button onclick="closeModal()"
      class="mt-4 bg-blue-600 text-white px-4 py-2 rounded-lg w-full hover:bg-blue-700">
      Done
    </button>
  </div>
</div>

<script>
async function simulatePayment(method) {
  const amount = document.getElementById("amount").value;
  const statusDiv = document.getElementById("status");

  if (!amount) {
    statusDiv.className = "text-red-600";
    statusDiv.innerText = "❌ Enter amount";
    return;
  }

  statusDiv.className = "text-yellow-600 animate-pulse";
  statusDiv.innerText = "🔐 Connecting to payment gateway...";

  await new Promise(r => setTimeout(r, 1500));

  statusDiv.innerText = "💳 Processing payment...";
  await new Promise(r => setTimeout(r, 1500));

  statusDiv.innerText = "🔍 Verifying transaction...";
  await new Promise(r => setTimeout(r, 1500));

  const res = await fetch("/simulate-payment/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": getCookie('csrftoken')
    },
    body: JSON.stringify({ amount, method })
  });

  const data = await res.json();

  showSuccessModal(data.transaction_id);
}

/* POPUP CONTROL */
function showSuccessModal(ref) {
  document.getElementById("refBox").innerText = "Ref: " + ref;
  document.getElementById("successModal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("successModal").classList.add("hidden");
}

/* CSRF helper */
function getCookie(name) {
  let cookieValue = null;
  document.cookie.split(';').forEach(cookie => {
    cookie = cookie.trim();
    if (cookie.startsWith(name + '=')) {
      cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
    }
  });
  return cookieValue;
}
</script>

</body>
</html>
